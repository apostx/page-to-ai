name: Publish to Chrome Web Store

on:
  push:
    tags:
      - "v*.*.*"

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        run: npm ci

      - name: Verify tag matches manifest version
        id: version
        run: |
          MANIFEST_VERSION=$(node -p "require('./manifest.json').version")
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          echo "manifest=$MANIFEST_VERSION" >> "$GITHUB_OUTPUT"
          echo "tag=$TAG_VERSION" >> "$GITHUB_OUTPUT"
          if [ "$MANIFEST_VERSION" != "$TAG_VERSION" ]; then
            echo "::error::Tag version ($TAG_VERSION) does not match manifest.json version ($MANIFEST_VERSION)"
            exit 1
          fi

      - name: Build extension zip
        run: npm run build

      - name: Upload and publish to Chrome Web Store
        run: |
          npx -y chrome-webstore-upload-cli@3 upload \
            --source "dist/page-to-ai-v${{ steps.version.outputs.manifest }}.zip" \
            --extension-id "${{ secrets.CWS_EXTENSION_ID }}" \
            --client-id "${{ secrets.CWS_CLIENT_ID }}" \
            --client-secret "${{ secrets.CWS_CLIENT_SECRET }}" \
            --refresh-token "${{ secrets.CWS_REFRESH_TOKEN }}" \
            --auto-publish

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/page-to-ai-v${{ steps.version.outputs.manifest }}.zip
          generate_release_notes: true
